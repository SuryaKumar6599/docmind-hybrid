kind = "web"
previewPath = "/"
title = "DocMind"
version = "1.0.0"
id = "artifacts/docmind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18463

[services.development]
run = "pnpm --filter @workspace/docmind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docmind", "run", "build" ]
publicDir = "artifacts/docmind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18463"
BASE_PATH = "/"
