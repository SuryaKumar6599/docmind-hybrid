<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      color: #17211d;
      background: #f7f4ed;
    }
    h2 { margin: 0 0 12px 0; font-size: 16px; color: #17211d; display: flex; align-items: center; gap: 8px; }
    p { font-size: 13px; color: rgba(23, 33, 29, 0.7); margin-bottom: 16px; }
    
    button {
      width: 100%;
      background: #315343;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { background: rgba(23, 33, 29, 0.25); cursor: not-allowed; }

    .divider { height: 1px; background: rgba(23, 33, 29, 0.1); margin: 16px 0; }
    
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: rgba(23, 33, 29, 0.6); }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid rgba(23, 33, 29, 0.15);
      font-size: 13px;
      font-family: monospace;
      outline: none;
    }
    input:focus { border-color: #315343; }
    .status { font-size: 11px; color: #5c7f68; margin-top: 6px; display: none; }
  </style>
</head>
<body>

  <h2>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
    DocMind Clipper
  </h2>
  <p>Instantly extract the job description and inject it into DocMind.</p>

  <button id="clip-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line></svg>
    Clip Job & Tailor
  </button>
  <div id="clip-status" class="status" style="margin-top:8px; text-align:center;">Job scraped! Opening DocMind...</div>

  <div class="divider"></div>

  <div>
    <label>DocMind Target URL</label>
    <input type="text" id="target-url" placeholder="http://localhost:5173/intelligence" />
    <div id="save-status" class="status">Saved!</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
